<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works プレビュー</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #ede8df;
      --gray: #7a7a72;
      --accent: #b8a88a;
      --bg: #080808;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      padding: 80px 9vw 100px;
    }

    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .top-bar span {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .top-bar a {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--gray);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 14px;
      transition: color 0.2s, border-color 0.2s;
    }

    .top-bar a:hover { color: var(--white); border-color: var(--gray); }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 5.5vw, 84px);
      font-weight: 300;
      margin-bottom: 48px;
      color: var(--white);
    }

    h1 small {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .works-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .work-card {
      background: rgba(8,8,8,0.55);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.35s, transform 0.35s;
    }

    .work-card:hover {
      border-color: rgba(184,168,138,0.35);
      transform: translateY(-5px);
    }

    .work-card__img {
      width: 100%;
      aspect-ratio: 4/3;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .work-card__img-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
    }

    .work-card__img-bg.blog   { background: linear-gradient(135deg, #0b0b14, #131320); }
    .work-card__img-bg.twuku  { background: linear-gradient(135deg, #090e0b, #0f1a10); }
    .work-card__img-bg.seal   { background: linear-gradient(135deg, #120b0b, #1e0f0f); }
    .work-card__img-bg.video  { background: linear-gradient(135deg, #0c0c0b, #1a1806); }

    .work-card__img-label {
      position: relative;
      z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 300;
      color: rgba(255,255,255,0.05);
      letter-spacing: -0.02em;
      user-select: none;
    }

    .work-card__body { padding: 18px 22px 22px; }

    .work-card__tags {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .work-card__tag {
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(184,168,138,0.28);
      padding: 3px 8px;
    }

    .work-card__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      margin-bottom: 5px;
    }

    .work-card__period {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--gray);
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px;
      color: var(--gray);
      font-size: 11px;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <span>Works プレビュー</span>
  <a href="admin.html">← 管理画面に戻る</a>
</div>

<h1>
  <small>02 — Works</small>
  制作実績
</h1>

<div class="works-grid" id="worksGrid">
  <div class="empty">読み込み中...</div>
</div>

<script>
  const STORAGE_KEY = 'cms_works';

  function render(works) {
    const grid = document.getElementById('worksGrid');
    if (!works.length) {
      grid.innerHTML = '<div class="empty">作品がまだありません</div>';
      return;
    }

    grid.innerHTML = works.map(w => `
      <a class="work-card" href="${w.url || '#'}" ${w.url?.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>
        <div class="work-card__img">
          <div class="work-card__img-bg ${w.theme ?? ''}"></div>
          <span class="work-card__img-label">${w.label ?? w.title}</span>
        </div>
        <div class="work-card__body">
          <div class="work-card__tags">
            ${w.tags.map(t => `<span class="work-card__tag">${t}</span>`).join('')}
          </div>
          <div class="work-card__title">${w.title}</div>
          <div class="work-card__period">${w.period}</div>
        </div>
      </a>
    `).join('');
  }

  // localStorage にあれば優先、なければ works.json から読む
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    render(JSON.parse(saved));
  } else {
    fetch('works.json')
      .then(r => r.json())
      .then(render);
  }
</script>
</body>
</html>
